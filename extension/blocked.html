<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Blocked</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #2b2b2b;
            color: #a9b7c6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 60px 40px;
            background: #3c3f41;
            border-radius: 8px;
            border: 1px solid #323232;
            box-shadow: 0 10px 15px rgba(0, 0, 0, 0.5);
        }

        .icon {
            font-size: 80px;
            margin-bottom: 24px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-5deg); }
            75% { transform: translateX(5px) rotate(5deg); }
        }

        h1 {
            font-size: 2.5em;
            font-weight: 700;
            margin-bottom: 16px;
            color: #ffffff;
        }

        .site {
            font-size: 1.1em;
            margin: 24px 0;
            padding: 16px 24px;
            background: #313335;
            border-radius: 6px;
            border: 1px solid #323232;
            font-family: 'SF Mono', 'Consolas', monospace;
            word-break: break-all;
            color: #cc7832;
        }

        .message {
            font-size: 1.15em;
            line-height: 1.6;
            margin: 24px 0;
            color: #a9b7c6;
        }

        .quote {
            font-style: italic;
            font-size: 1em;
            margin-top: 32px;
            padding: 20px;
            background: #313335;
            border-radius: 6px;
            border-left: 4px solid #6897bb;
        }

        .quote-author {
            display: block;
            margin-top: 12px;
            font-size: 0.9em;
            color: #808080;
        }

        .timer {
            margin-top: 24px;
            font-size: 0.95em;
            color: #808080;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">&#128683;</div>
        <h1>Site Blocked</h1>
        <div class="site" id="blocked-site">Loading...</div>
        <div class="message">
            This site is blocked during your focus period.
            <br><br>
            Take a deep breath and stay focused on what matters.
        </div>
        <div class="quote" id="quote-container">
            <span id="quote-text"></span>
            <span class="quote-author" id="quote-author"></span>
        </div>
        <div class="timer" id="timer"></div>
    </div>
    <script src="blocked.js"></script>
</body>
</html>
